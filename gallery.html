<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Музейная галерея</title>
    <link rel="stylesheet" href="gallery-styles.css">
</head>
<body>
    <header>МУЗЕЙ ИСКУССТВ</header>
    <div class="gallery" id="gallery"></div>
    
    <!-- Модальное окно с информацией о картине -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            
            <!-- Левая колонка: картина, название, автор + пазл -->
            <div class="left-column">
                <div class="image-container">
                    <img id="modalImage" class="modal-image" src="" alt="">
                </div>
                <div id="modalTitle" class="modal-title"></div>
                <div id="modalAuthor" class="modal-author"></div>
                
                <!-- Секция пазла -->
                <div class="puzzle-section-left">
                    <div class="puzzle-button-wrapper">
                        <span class="puzzle-icon">🧩</span>
                        <button class="puzzle-button" id="puzzleBtn">Собрать пазл</button>
                    </div>
                    <div class="puzzle-hint">Соберите пазл, чтобы картина ожила</div>
                    <div class="difficulty-menu" id="difficultyMenu">
                        <button class="difficulty-btn easy" data-difficulty="easy">Легкий</button>
                        <button class="difficulty-btn medium" data-difficulty="medium">Средний</button>
                        <button class="difficulty-btn hard" data-difficulty="hard">Сложный</button>
                    </div>
                </div>
            </div>
            
            <!-- Правая колонка: описание и смысл -->
            <div class="right-column">
                <div id="modalDetails" class="modal-details"></div>
                <div id="modalMeaning" class="modal-meaning"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно пазла - С БАГЕТОМ -->
    <div class="puzzle-modal" id="puzzleModal">
        <div class="puzzle-modal-content">
            <div class="puzzle-modal-header">
                <h2>
                    <span class="header-icon">🧩</span>
                    <span id="puzzleModalTitle">Сборка пазла</span>
                </h2>
                <div class="puzzle-close-btn" id="closePuzzleModal">⬅</div>
            </div>
            
            <div class="puzzle-board-container">
                <!-- Добавлен багет вокруг пазла -->
                <div class="puzzle-frame">
                    <div class="puzzle-board" id="puzzleBoard"></div>
                    <video class="puzzle-animation" id="puzzleAnimation" loop muted playsinline></video>
                </div>
            </div>
        </div>
    </div>

    <div class="exit-trigger" id="exitTrigger" title="Выход (только для персонала)"></div>

    <script src="gallery-script.js"></script>
</body>
</html>
